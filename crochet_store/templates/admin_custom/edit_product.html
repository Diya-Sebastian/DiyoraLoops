{% extends 'admin_custom/dashboard.html' %}

{% block admin_content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Edit Product: {{ product.name }}</h1>
</div>

<div class="card shadow-sm border-0 col-md-8">
    <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="name" class="form-control" value="{{ product.name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Price (₹)</label>
                    <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price }}" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Category</label>
                <select name="category" class="form-select">
                    {% for val, label in categories %}
                        <option value="{{ val }}" {% if product.category == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="4" required>{{ product.description }}</textarea>
            </div>

            <div class="mb-4">
                <label class="form-label">Update Image (Leave blank to keep current)</label>
                <input type="file" name="image" class="form-control">
                {% if product.image %}
                    <div class="mt-2">
                        <small class="text-muted">Current image:</small><br>
                        <img src="{{ product.image.url }}" alt="current" style="height: 100px; border-radius: 8px;" class="mt-1 shadow-sm">
                    </div>
                {% endif %}
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                <a href="{% url 'admin_custom:manage_products' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
