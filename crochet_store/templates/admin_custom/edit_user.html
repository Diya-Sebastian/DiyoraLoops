{% extends 'admin_custom/dashboard.html' %}

{% block admin_content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Edit User: {{ target_user.username }}</h1>
</div>

<div class="card shadow-sm border-0 col-md-6">
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" value="{{ target_user.email }}" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Role</label>
                <select name="role" class="form-select">
                    <option value="customer" {% if target_user.role == 'customer' %}selected{% endif %}>Customer</option>
                    <option value="seller" {% if target_user.role == 'seller' %}selected{% endif %}>Seller</option>
                    <option value="admin" {% if target_user.role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'admin_custom:manage_users' %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
