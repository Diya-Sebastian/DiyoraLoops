{% extends 'admin_custom/dashboard.html' %}

{% block admin_content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">View Products</h1>
</div>
<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for p in products %}
    <div class="col">
        <div class="card shadow-sm h-100 border-0">
            {% if p.image %}
                <img src="{{ p.image.url }}" class="card-img-top" alt="{{ p.name }}" style="height: 200px; object-fit: cover;">
            {% else %}
                <div class="bg-light text-center py-5"><i class="fas fa-image fa-3x text-muted"></i></div>
            {% endif %}
            <div class="card-body">
                <h5 class="card-title fw-bold text-primary">{{ p.name }}</h5>
                <p class="card-text text-muted mb-1"><strong>Price:</strong> ₹{{ p.price }}</p>
                <p class="card-text text-muted mb-1"><strong>Category:</strong> {{ p.get_category_display }}</p>
                <p class="card-text text-muted small"><strong>Seller:</strong> {{ p.seller.username }}</p>
            </div>
            <div class="card-footer bg-transparent border-0 pb-3 d-flex gap-2">
                <a href="{% url 'admin_custom:edit_product' p.product_id %}" class="btn btn-sm btn-outline-primary flex-fill">
                    <i class="fas fa-edit me-1"></i> Edit
                </a>
                <a href="{% url 'admin_custom:delete_product' p.product_id %}" class="btn btn-sm btn-outline-danger flex-fill" onclick="return confirm('Are you sure you want to delete this product?')">
                    <i class="fas fa-trash me-1"></i> Delete
                </a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
