{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'products:home' %}">Home</a></li>
            <li class="breadcrumb-item"><a href="{% url 'products:product_list' %}">Shop</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{ product.name }}</li>
        </ol>
    </nav>

    <div class="row mt-4">
        <div class="col-md-6">
            {% if product.image %}
                <img src="{{ product.image.url }}" class="img-fluid rounded shadow-sm" alt="{{ product.name }}">
            {% else %}
                <div class="bg-secondary text-white d-flex align-items-center justify-content-center rounded shadow-sm" style="height: 400px;">No Image Available</div>
            {% endif %}
        </div>
        <div class="col-md-6">
            <h1 class="display-5 fw-bold">{{ product.name }}</h1>
            <p class="text-muted fs-5 mb-4">Category: {{ product.get_category_display }}</p>
            <h2 class="text-primary fw-bold mb-4">₹{{ product.price }}</h2>
            
            <p class="lead">{{ product.description }}</p>
            
            <div class="d-grid gap-2 d-md-flex mt-5">
                <a href="{% url 'orders:add_to_cart' product.pk %}" class="btn btn-primary btn-lg px-5"><i class="fas fa-cart-plus"></i> Add to Cart</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
