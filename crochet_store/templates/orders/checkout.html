{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8">
            <h2 class="mb-4">Checkout</h2>
            <form method="post">
                {% csrf_token %}
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-body">
                        <h5 class="card-title fw-bold mb-4">Shipping Details</h5>
                        <div class="mb-3">
                            <label class="form-label">Full Name <span class="text-danger">*</span></label>
                            <input type="text" name="shipping_name" class="form-control" value="{{ user.get_full_name }}" required placeholder="Enter recipient name">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Complete Address <span class="text-danger">*</span></label>
                            <textarea name="shipping_address" class="form-control" rows="4" required placeholder="Enter delivery address with PIN code"></textarea>
                        </div>
                    </div>
                </div>
                
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                        Confirm & View Summary
                    </button>
                </div>
            </form>
        </div>
        
        <div class="col-md-4">
            <div class="card shadow-sm border-0 bg-white p-3">
                <div class="card-body">
                    <h5 class="fw-bold mb-4">Order Summary</h5>
                    {% for item in cart_items %}
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">{{ item.product.name }} (x{{ item.quantity }})</span>
                            <span class="fw-bold">₹{{ item.item_total }}</span>
                        </div>
                    {% endfor %}
                    <hr class="my-4">
                    <div class="d-flex justify-content-between fw-bold fs-5">
                        <span>Total:</span>
                        <span class="text-primary">₹{{ total }}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
