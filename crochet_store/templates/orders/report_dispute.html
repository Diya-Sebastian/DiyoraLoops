{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="bg-danger-subtle rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                            <i class="fas fa-exclamation-triangle fa-2x text-danger"></i>
                        </div>
                        <h2 class="fw-bold">Report a Problem</h2>
                        <p class="text-muted">Order ID: #{{ order.order_id|stringformat:".8s" }}</p>
                    </div>

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-bold">Issue Subject</label>
                            <select name="subject" class="form-select" required>
                                <option value="" selected disabled>Select an issue...</option>
                                <option value="Wrong Item">Received the wrong item</option>
                                <option value="Damaged Product">Product is damaged</option>
                                <option value="Delivery Delay">Delivery is taking too long</option>
                                <option value="Payment Issue">Problem with payment/refund</option>
                                <option value="Other">Other issue</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Detailed Description</label>
                            <textarea name="description" class="form-control" rows="5" placeholder="Tell us more about what happened..." required></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg py-3">Submit Dispute</button>
                            <a href="{% url 'orders:tracking' %}" class="btn btn-link text-muted">Go Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
