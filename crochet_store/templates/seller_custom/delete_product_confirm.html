{% extends 'seller_custom/dashboard.html' %}

{% block seller_content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5 text-center">
                    <div class="text-danger mb-4">
                        <i class="fas fa-exclamation-triangle fa-4x"></i>
                    </div>
                    <h2 class="fw-bold mb-3">Delete Product?</h2>
                    <p class="text-muted mb-4">Are you sure you want to delete <strong>"{{ product.name }}"</strong>? This action cannot be undone.</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-danger btn-lg">Yes, Delete Product</button>
                            <a href="{% url 'seller_custom:manage_products' %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
