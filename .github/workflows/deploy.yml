name: Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_IP }}
        username: ubuntu
        key: ${{ secrets.AWS_SSH_KEY }}
        command_timeout: 10m
        script: |
          cd /home/ubuntu/diyora_loops
          git pull origin main
          source venv/bin/activate
          cd crochet_store
          # Only install basic requirements or skip if they exist
          pip install --upgrade pip
          pip install django mysqlclient pillow razorpay reportlab
          python3 manage.py migrate
          python3 manage.py collectstatic --noinput
          # Kill any old gunicorn processes first
          sudo pkill gunicorn || echo "No gunicorn to kill"
          # Start Gunicorn in the background
          nohup gunicorn --bind 0.0.0.0:8000 crochet_store.wsgi:application > gunicorn.log 2>&1 &
          echo "Gunicorn started successfully in background"
