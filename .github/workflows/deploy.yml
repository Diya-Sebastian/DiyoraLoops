name: Deploy to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_IP }}
        username: ubuntu
        key: ${{ secrets.AWS_SSH_KEY }}
        command_timeout: 10m
        script: |
          cd /home/ubuntu/diyora_loops
          git pull origin main
          source venv/bin/activate
          cd crochet_store
          # Only install basic requirements or skip if they exist
          pip install --upgrade pip
          pip install django mysqlclient pillow razorpay reportlab
          python3 manage.py migrate
          python3 manage.py collectstatic --noinput
          # Restart Gunicorn gracefully (don't fail if service not found)
          sudo systemctl restart gunicorn || sudo pkill -HUP gunicorn || echo "Gunicorn restart handled manually"
