{% extends 'base.html' %}
{% block title %}Custom Request | DiyoraLoops{% endblock %}

{% block content %}
<div class="glass-panel" style="max-width: 600px; margin: 4rem auto; padding: 2rem;">
    <h2 class="text-gradient" style="text-align: center; margin-bottom: 2rem;">Request Custom Crochet</h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label class="form-label">Describe Your Dream Item</label>
            <textarea name="description" class="form-control" rows="5" placeholder="I would like a blue whale amigurumi strictly 12 inches long with a pink bowtie..." required></textarea>
        </div>
        
        <div class="form-group">
            <label class="form-label">Reference Image (Optional)</label>
            <input type="file" name="image" class="form-control" accept="image/*">
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Submit Request</button>
    </form>
</div>
{% endblock %}
