{% extends 'base.html' %}
{% block title %}Login | DiyoraLoops{% endblock %}

{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: 4rem auto; padding: 2rem;">
    <h2 class="text-gradient" style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
    
    <form method="POST">
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <div class="form-group">
                <label class="form-label">{{ field.label }}</label>
                {{ field.errors }}
                {{ field }}
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Log In</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-secondary);">
        Don't have an account? <a href="{% url 'register' %}">Sign Up</a>
    </p>
</div>
{% endblock %}
